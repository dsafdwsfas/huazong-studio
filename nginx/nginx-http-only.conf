# =============================================
# 画宗制片中枢 — 纯 HTTP 配置（首次部署 / 无证书时使用）
# 申请证书后由 setup-ssl.sh 自动切换到 nginx.conf（含 HTTPS）
# =============================================

server {
    listen 80;
    server_name _;

    # Docker DNS resolver — 让 upstream 在运行时解析而非启动时
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://api:5000;
    set $events_upstream http://events:5001;

    client_max_body_size 500m;

    # Let's Encrypt ACME 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/html text/css text/plain
        application/json application/javascript
        text/xml application/xml;

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # API proxy — 前端调 /api/xxx，后端路由是 /xxx，去掉 /api 前缀
    location /api/ {
        proxy_pass $api_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebSocket
    location /socket.io/ {
        proxy_pass $events_upstream/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # COS upload CORS
    location /api/cos-upload/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, x-cos-security-token, x-cos-meta-*';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }
        proxy_pass $api_upstream/cos-upload/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 0;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Static files
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|otf|js|css)$ {
        root /var/www/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Frontend SPA
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
