upstream api_backend {
    server api:5000;
}

upstream events_backend {
    server events:5001;
}

# ----- HTTP: ACME 验证 + 强制跳转 HTTPS -----
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME 验证（必须保留，certbot 续签需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Health check（负载均衡用，不跳转）
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # 有证书时跳转 HTTPS，无证书时直接服务
    location / {
        # 检测是否有 SSL 证书 — 如果有，301 跳转
        # 如果没有证书（首次部署），直接返回内容
        return 301 https://$host$request_uri;
    }
}

# ----- HTTPS: 主服务 -----
# 注意: 首次部署还没有证书时，注释掉整个 HTTPS server 块，
# 等 setup-ssl.sh 申请证书后再取消注释并 reload。
# setup-ssl.sh 会自动处理这个流程。
server {
    listen 443 ssl http2;
    server_name _;

    # SSL 证书路径（Let's Encrypt 默认位置）
    ssl_certificate     /etc/letsencrypt/live/huazong/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/huazong/privkey.pem;

    # SSL 安全配置（Mozilla Intermediate）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS（首次测试时可先注释，确认无误再启用）
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    client_max_body_size 500m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/plain
        application/json
        application/javascript
        text/xml
        application/xml;

    # API proxy
    location /api/ {
        proxy_pass http://api_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebSocket (Socket.IO) proxy
    location /socket.io/ {
        proxy_pass http://events_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # ----- COS presigned upload CORS -----
    location /api/cos-upload/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, x-cos-security-token, x-cos-meta-*';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        proxy_pass http://api_backend/api/cos-upload/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 0;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ----- COS CDN proxy -----
    location /cos-assets/ {
        internal;
        proxy_pass https://$arg_bucket.cos.$arg_region.myqcloud.com/$arg_key;
        proxy_set_header Host $arg_bucket.cos.$arg_region.myqcloud.com;

        proxy_hide_header x-cos-request-id;
        proxy_hide_header x-cos-trace-id;

        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status $upstream_cache_status;
        access_log off;
    }

    # Static file caching
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|otf|js|css)$ {
        root /var/www/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Frontend SPA
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
