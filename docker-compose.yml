# =============================================
# 画宗制片中枢 — Docker Compose（2C2G 轻量版）
# 移除 MeiliSearch，加内存限制，适配腾讯云小规格 CVM
# =============================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zou}
      POSTGRES_USER: ${POSTGRES_USER:-zou}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - huazong-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zou}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    command: >
      postgres
        -c shared_buffers=64MB
        -c effective_cache_size=128MB
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c max_connections=50

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - huazong-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
    command: redis-server --maxmemory 48mb --maxmemory-policy allkeys-lru

  api:
    build:
      context: ./kitsu-zou
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["api"]
    environment:
      DB_USERNAME: ${POSTGRES_USER:-zou}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-zou}
      KV_HOST: redis
      KV_PORT: "6379"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      # MeiliSearch 已禁用 — 留空跳过初始化
      INDEXER_HOST: ""
      INDEXER_PORT: ""
      INDEXER_KEY: ""
      EVENT_STREAM_HOST: events
      EVENT_STREAM_PORT: "5001"
      PREVIEW_FOLDER: /opt/zou/previews
      TMP_DIR: /opt/zou/tmp
      # Gunicorn 轻量配置
      GUNICORN_WORKERS: "2"
      # COS 对象存储
      FS_BACKEND: ${FS_BACKEND:-local}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_REGION: ${COS_REGION:-ap-beijing}
      COS_BUCKET_PICTURES: ${COS_BUCKET_PICTURES:-}
      COS_BUCKET_MOVIES: ${COS_BUCKET_MOVIES:-}
      COS_BUCKET_FILES: ${COS_BUCKET_FILES:-}
      COS_CDN_DOMAIN: ${COS_CDN_DOMAIN:-}
      COS_CDN_ENABLED: ${COS_CDN_ENABLED:-false}
      COS_PRESIGN_EXPIRED: ${COS_PRESIGN_EXPIRED:-3600}
      COS_CI_ENABLED: ${COS_CI_ENABLED:-false}
      COS_CI_THUMBNAIL_STYLE: ${COS_CI_THUMBNAIL_STYLE:-imageView2/1/w/200/h/200}
    volumes:
      - previews:/opt/zou/previews
      - tmp:/opt/zou/tmp
    networks:
      - huazong-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M

  events:
    build:
      context: ./kitsu-zou
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["events"]
    environment:
      DB_USERNAME: ${POSTGRES_USER:-zou}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-zou}
      KV_HOST: redis
      KV_PORT: "6379"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      EVENT_STREAM_HOST: "0.0.0.0"
      EVENT_STREAM_PORT: "5001"
      # MeiliSearch 已禁用
      INDEXER_KEY: ""
      # COS 对象存储（events 服务需要读取存储配置）
      FS_BACKEND: ${FS_BACKEND:-local}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_REGION: ${COS_REGION:-ap-beijing}
      COS_BUCKET_PICTURES: ${COS_BUCKET_PICTURES:-}
      COS_BUCKET_MOVIES: ${COS_BUCKET_MOVIES:-}
      COS_BUCKET_FILES: ${COS_BUCKET_FILES:-}
      COS_CDN_DOMAIN: ${COS_CDN_DOMAIN:-}
      COS_CDN_ENABLED: ${COS_CDN_ENABLED:-false}
      COS_PRESIGN_EXPIRED: ${COS_PRESIGN_EXPIRED:-3600}
      COS_CI_ENABLED: ${COS_CI_ENABLED:-false}
      COS_CI_THUMBNAIL_STYLE: ${COS_CI_THUMBNAIL_STYLE:-imageView2/1/w/200/h/200}
    networks:
      - huazong-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 192M

  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
      # setup-ssl.sh 申请证书后会覆盖此文件启用 HTTPS
      - ./nginx/active-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - huazong-net
    depends_on:
      - api
      - events
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  pgdata:
  redisdata:
  previews:
  tmp:
  certbot-etc:
  certbot-var:
  certbot-webroot:

networks:
  huazong-net:
    driver: bridge
